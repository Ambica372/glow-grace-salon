<!DOCTYPE html>

<head>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #ffc2d1);
}

header {
  background: #111;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.hero {
  height: 80vh;
  background: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9") center/cover;
  display: flex;
  justify-content: center;

.cards {

  justify-content: center;

  padding: 40px;

.card {
  background: white;
  padding: 20px;

.card button {

  padding: 10px;

.contact {
  text-align: center;
  padding: 40px;

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
}

#btn-download {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: #d6336c;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

footer a {
  color: white;
  margin: 0 10px;

  <h2>Glow & Grace</h2>

<!-- DATA LAYER -->
<script>
window.dataLayer = window.dataLayer || [];
</script>

<!-- SERVICE CLICK -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".btn-book").forEach(button => {
    button.addEventListener("click", function () {

      const serviceName = this.getAttribute("data-service");

      alert("Clicked: " + serviceName);

      dataLayer.push({
        event: "service_click",
        service_name: serviceName
      });

    });
  });

});
</script>

<!-- DOWNLOAD CLICK -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("btn-download");

  btn.addEventListener("click", function () {

    alert("Downloading brochure...");

    window.open("https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf");

  });

});
</script>

<!-- FORM TRACKING -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("contact-form");

  let formStarted = false;
  let formSubmitted = false;

  form.addEventListener("focusin", function () {
    if (!formStarted) {
      formStarted = true;

      dataLayer.push({
        event:"form_interaction",
        form_name: "contact_form",
        form_status:"form_start"
      });
    }
  });

  document.querySelectorAll("#contact-form input").forEach(input => {
    input.addEventListener("focus", function () {
      dataLayer.push({
        event: "form_interaction",
        field_name: this.name,
        form_name: "contact_form",
        form_status:"form_field_focus"
      });
    });
  });

  document.querySelectorAll("#contact-form input").forEach(input => {
    input.addEventListener("invalid", function () {
      dataLayer.push({
        event: "form_interaction",
        field_name: this.name,
        form_name: "contact_form",
         form_status:"form_error"
      });
    });
  });

  form.addEventListener("submit", function () {

    formSubmitted = true;

    dataLayer.push({
      event: "form_interaction",
      form_name: "contact_form",
       form_status:"form_submit"
    });

  });

  window.addEventListener("beforeunload", function () {
    if (formStarted && !formSubmitted) {
      dataLayer.push({
        event: "form_interaction",
        form_name: "contact_form",
         form_status:"form_abandon"
      });
    }
  });

});
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {

  const video = document.getElementById("custom-video");

  if (!video) {
    console.log("Video not found");
    return;
  }

  let progress25 = false;
  let progress50 = false;
  let progress75 = false;

  /* =========================
  ▶️ PLAY
  ========================= */
  video.addEventListener("play", function () {

    dataLayer.push({
      event: "video_custom",
      video_status: "play",
      video_name: "custom_video"
    });

  });

  /* =========================
  ⏸️ PAUSE
  ========================= */
  video.addEventListener("pause", function () {

    dataLayer.push({
      event: "video_custom",
      video_status: "pause",
      video_name: "custom_video"
    });

  });

  /* =========================
  ⏱️ PROGRESS
  ========================= */
  video.addEventListener("timeupdate", function () {

    const percent = (video.currentTime / video.duration) * 100;

    if (percent >= 25 && !progress25) {
      progress25 = true;

      dataLayer.push({
        event: "video_custom",
        video_status: "progress",
        video_name: "custom_video",
        video_percent: 25
      });
    }

    if (percent >= 50 && !progress50) {
      progress50 = true;

      dataLayer.push({
        event: "video_custom",
        video_status: "progress",
        video_name: "custom_video",
        video_percent: 50
      });
    }

    if (percent >= 75 && !progress75) {
      progress75 = true;

      dataLayer.push({
        event: "video_custom",
        video_status: "progress",
        video_name: "custom_video",
        video_percent: 75
      });
    }

  });

  /* =========================
  ✅ COMPLETE
  ========================= */
  video.addEventListener("ended", function () {

    dataLayer.push({
      event: "video_custom",
      video_status: "complete",
      video_name: "custom_video",
      video_percent: 100
    });

  });

});
</script>
