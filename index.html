<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow & Grace Salon</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe4ec, #ffc2d1);
  background-attachment: fixed;
}

/* NAVBAR */
header {
  background: #111;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 90vh;
  background: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9") center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.hero button {
  padding: 14px 24px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff4d6d, #ff85a1);
  color: white;
  cursor: pointer;
}

/* SERVICES */
.services {
  padding: 60px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 25px;
  width: 260px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(255,105,135,0.2);
}

.card button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, #ff4d6d, #ff85a1);
  color: white;
}

/* CONTACT */
.contact {
  padding: 60px;
  text-align: center;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<!-- GTM -->
<script>
(function(w,d,s,l,i){w[l]=w[l]||[];
w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
var f=d.getElementsByTagName(s)[0],
j=d.createElement(s);
j.async=true;
j.src='https://www.googletagmanager.com/gtm.js?id='+i;
f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-T8K6STKN');
</script>

<body>

<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T8K6STKN"
height="0" width="0" style="display:none"></iframe>
</noscript>

<header>
  <h2>Glow & Grace</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Luxury Beauty Experience</h1>
  <button>Book Appointment</button>
</section>

<section class="services">
  <h2>Our Services</h2>

  <div class="cards">

    <div class="card">
      <h3>Hair Styling</h3>
      <button onclick="trackService('hair')">Book</button>
    </div>

    <div class="card">
      <h3>Facial Treatment</h3>
      <button onclick="trackService('facial')">Book</button>
    </div>

    <div class="card">
      <h3>Bridal Makeup</h3>
      <button onclick="trackService('bridal')">Book</button>
    </div>

  </div>

  <button id="btn-download">Download Brochure</button>
</section>

<section class="contact">
  <h2>Contact Us</h2>

  <!-- FIXED FORM -->
  <form id="contact-form">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <button type="submit">Submit</button>
  </form>

</section>

<footer>
  <p>Follow us</p>
</footer>

<!-- ================= JS ================= -->

<script>
window.dataLayer = window.dataLayer || [];

/* SERVICE CLICK */
function trackService(serviceName) {
  dataLayer.push({
    event: "service_click",
    service_name: serviceName
  });
}

/* FORM TRACKING */
const form = document.getElementById("contact-form");
let formStarted = false;

/* START */
form.addEventListener("focusin", function () {
  if (!formStarted) {
    formStarted = true;
    dataLayer.push({
      event: "form_start",
      form_name: "contact_form"
    });
  }
});

/* FIELD */
document.querySelectorAll("#contact-form input").forEach(input => {
  input.addEventListener("focus", function () {
    dataLayer.push({
      event: "field_focus",
      field_name: this.name,
      form_name: "contact_form"
    });
  });
});

/* ERROR */
document.querySelectorAll("#contact-form input").forEach(input => {
  input.addEventListener("invalid", function () {
    dataLayer.push({
      event: "form_error",
      field_name: this.name,
      form_name: "contact_form"
    });
  });
});

/* SUBMIT */
form.addEventListener("submit", function () {
  dataLayer.push({
    event: "form_submit",
    form_name: "contact_form"
  });
});

/* ABANDON */
window.addEventListener("beforeunload", function () {
  if (formStarted) {
    dataLayer.push({
      event: "form_abandon",
      form_name: "contact_form"
    });
  }
});
</script>

</body>
</html>
