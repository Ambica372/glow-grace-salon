<!-- ================= DATA LAYER ================= -->
<script>
window.dataLayer = window.dataLayer || [];
</script>

<!-- ================= ALERT FUNCTION ================= -->
<script>
function showAlert(serviceName) {
  alert("Clicked: " + serviceName);
}
</script>

<!-- ================= SERVICE TRACKING ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".btn-book").forEach(button => {
    button.addEventListener("click", function () {

      const serviceName = this.getAttribute("data-service");

      showAlert(serviceName);

      dataLayer.push({
        event: "service_click",
        service_name: serviceName
      });

    });
  });

});
</script>

<!-- ================= FORM TRACKING ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  window.dataLayer = window.dataLayer || [];

  const form = document.getElementById("contact-form");

  let formStarted = false;
  let formSubmitted = false;

  /* =========================
  1. FORM START (FIRST INTERACTION)
  ========================= */
  form.addEventListener("focusin", function () {
    if (!formStarted) {
      formStarted = true;

      dataLayer.push({
        event: "form_start",
        form_name: "contact_form"
      });
    }
  });


  /* =========================
  2. FIELD FOCUS
  ========================= */
  document.querySelectorAll("#contact-form input").forEach(input => {
    input.addEventListener("focus", function () {

      dataLayer.push({
        event: "field_focus",
        field_name: this.name || this.placeholder,
        form_name: "contact_form"
      });

    });
  });


  /* =========================
  3. FORM ERROR (VALIDATION)
  ========================= */
  document.querySelectorAll("#contact-form input").forEach(input => {
    input.addEventListener("invalid", function () {

      dataLayer.push({
        event: "form_error",
        field_name: this.name || this.placeholder,
        form_name: "contact_form"
      });

    });
  });


  /* =========================
  4. FORM SUBMIT
  ========================= */
  form.addEventListener("submit", function (e) {

    formSubmitted = true;

    dataLayer.push({
      event: "form_submit",
      form_name: "contact_form"
    });

    // OPTIONAL: keep this ONLY if you want to stop page reload
    // e.preventDefault();

  });


  /* =========================
  5. FORM ABANDON (FIXED LOGIC)
  ========================= */
  window.addEventListener("beforeunload", function () {

    if (formStarted && !formSubmitted) {

      dataLayer.push({
        event: "form_abandon",
        form_name: "contact_form"
      });

    }

  });

});
</script>
