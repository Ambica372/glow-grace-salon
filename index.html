<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow & Grace Salon</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffe4ec, #ffc2d1);
}

header {
  background: #111;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.hero {
  height: 80vh;
  background: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9") center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 40px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  text-align: center;
}

.card button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #ff4d6d;
  color: white;
}

.contact {
  text-align: center;
  padding: 40px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
}

footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h2>Glow & Grace</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Luxury Beauty Experience</h1>
</section>

<section class="services">

<div class="cards">

<div class="card">
<h3>Hair Styling</h3>
<button class="btn-book" data-service="hair">Book</button>
</div>

<div class="card">
<h3>Facial Treatment</h3>
<button class="btn-book" data-service="facial">Book</button>
</div>

<div class="card">
<h3>Bridal Makeup</h3>
<button class="btn-book" data-service="bridal">Book</button>
</div>

</div>

</section>

<section class="contact">

<h2>Contact</h2>

<form id="contact-form">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<button type="submit">Submit</button>
</form>

</section>

<footer>
<p>Follow us</p>
</footer>

<!-- ================= DATA LAYER ================= -->
<script>
window.dataLayer = window.dataLayer || [];
</script>

<!-- ================= ALERT FUNCTION ================= -->
<script>
function showAlert(serviceName) {
  alert("Clicked: " + serviceName);
}
</script>

<!-- ================= SERVICE TRACKING ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".btn-book").forEach(button => {
    button.addEventListener("click", function () {

      const serviceName = this.getAttribute("data-service");

      showAlert(serviceName);

      dataLayer.push({
        event: "service_click",
        service_name: serviceName
      });

    });
  });

});
</script>

<!-- ================= FORM TRACKING ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("contact-form");
  let formStarted = false;

  form.addEventListener("focusin", function () {
    if (!formStarted) {
      formStarted = true;
      dataLayer.push({
        event: "form_start",
        form_name: "contact_form"
      });
    }
  });

  document.querySelectorAll("#contact-form input").forEach(input => {
    input.addEventListener("focus", function () {
      dataLayer.push({
        event: "field_focus",
        field_name: this.name,
        form_name: "contact_form"
      });
    });

    input.addEventListener("invalid", function () {
      dataLayer.push({
        event: "form_error",
        field_name: this.name,
        form_name: "contact_form"
      });
    });
  });

  form.addEventListener("submit", function () {
    dataLayer.push({
      event: "form_submit",
      form_name: "contact_form"
    });
  });

  window.addEventListener("beforeunload", function () {
    if (formStarted) {
      dataLayer.push({
        event: "form_abandon",
        form_name: "contact_form"
      });
    }
  });

});
</script>

</body>
</html>
